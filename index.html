<Header>
  <h1>Project Library</h1>
</Header>

<main>
  <section id="Booklist">
  </section>

  <div>
    <button command="show-modal" commandfor="Add book" class="Add book">Add Book</button>
    <dialog id="Add book">
      <form method="dialog">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>

        <label for="author">Author:</label>
        <input type="text" id="author" name="author" required><br><br>

        <label for="pages">Pages:</label>
        <input type="number" id="pages" name="pages" required><br><br>

        <label for="read">Read:</label>
        <input type="checkbox" id="read" name="read"><br><br>

        <button type="submit">Add Book</button> 
    </div>

    <div class="form-actions">  
      <button type="submit" id="submit-button">Submit</button>
    </div>
  </form>

  <button commandfor="Add book" command="close">Cancel</button>
  </dialog>
</main>
