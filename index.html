<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Library</title>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Project Library</h1>
  </header>

  <main>
    <section id="Booklist"></section>

    <button id="open-dialog">Add Book</button>

    <dialog id="add-book">
      <form id="book-form">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>

        <label for="author">Author:</label>
        <input type="text" id="author" name="author" required><br><br>

        <label for="pages">Pages:</label>
        <input type="number" id="pages" name="pages" required><br><br>

        <label for="read">Read:</label>
        <input type="checkbox" id="read" name="read"><br><br>

        <button type="submit">Save Book</button>
        <button type="button" onclick="document.getElementById('add-book').close()">Cancel</button>
      </form>
    </dialog>
  </main>
</body>
</html>
